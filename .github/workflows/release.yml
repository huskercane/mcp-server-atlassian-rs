name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to publish under (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: mcp-atlassian
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            asset: mcp-atlassian-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            asset: mcp-atlassian-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            asset: mcp-atlassian-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            asset: mcp-atlassian-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          staging="${{ matrix.asset }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$staging/"
          cp README.md "$staging/"
          tar -czf "${staging}.tar.gz" "$staging"
          shasum -a 256 "${staging}.tar.gz" > "${staging}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" "$staging/"
          Copy-Item README.md "$staging/"
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"
          (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash.ToLower() + "  $staging.zip" `
            | Out-File -Encoding ascii "$staging.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.${{ matrix.archive }}
            ${{ matrix.asset }}.${{ matrix.archive }}.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: artifacts/*
