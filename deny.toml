# cargo-deny configuration for the Rust port of mcp-server-atlassian (Bitbucket + Jira).
#
# Run locally with `cargo deny check` from inside `rust/`. Not wired into CI.
# Strict mode: every unhandled advisory, license, or ban is a hard error.

[graph]
all-features = false

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Every license that must appear in the transitive dep graph to build the
# crate. Kept explicit so a new dep with an unfamiliar license triggers a
# review instead of silently landing.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    # Used by `webpki-root-certs`, a cert bundle pulled in by rustls.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
